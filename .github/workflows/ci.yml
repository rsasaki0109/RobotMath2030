name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  test-torch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[all]"
      - name: Run torch chapter tests
        run: pytest -q tests/test_diffusion_policy.py tests/test_flow_matching.py tests/test_differentiable_physics.py tests/test_world_model.py tests/test_se3_equivariant.py tests/test_neural_operators.py tests/test_fno.py
      - name: Smoke all chapter demos
        run: python scripts/smoke_all_chapters.py
        env:
          MPLBACKEND: Agg
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[all]"
      - name: Run timed regression benchmarks
        run: python benchmarks/run_benchmarks.py
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
