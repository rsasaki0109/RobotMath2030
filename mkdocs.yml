site_name: RobotMath2030
site_description: Executable math for future robotics, Physical AI, and world models
site_url: https://rsasaki0109.github.io/RobotMath2030/
repo_url: https://github.com/rsasaki0109/RobotMath2030
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - 15 Tiny Math Engines: landing.md
  - Chapter guide: chapters.md
  - Chapters:
      - "01 — Pose is not a vector": chapters/01_pose_is_not_vector.md
      - "02 — Tiny Lie Graph Optimizer": chapters/02_tiny_lie_graph_optimizer.md
      - "03 — Retraction vs Projection": chapters/03_retraction_vs_projection.md
      - "04 — Riemannian Motion Policy (2D)": chapters/04_riemannian_motion_policy.md
      - "05 — Sinkhorn for Point Clouds and Maps": chapters/05_sinkhorn_point_clouds.md
      - "06 — Wasserstein Map Evaluation": chapters/06_wasserstein_map_evaluation.md
      - "07 — Diffusion Policy for 2D Trajectories": chapters/07_diffusion_policy_2d.md
      - "08 — Flow Matching vs Diffusion": chapters/08_flow_matching_vs_diffusion.md
      - "09 — Differentiable Physics": chapters/09_differentiable_physics.md
      - "10 — Tiny Latent World Model + Planning": chapters/10_tiny_world_model.md
      - "11 — Information Geometry": chapters/11_information_geometry.md
      - "12 — SE(3)-Equivariant Preview": chapters/12_se3_equivariant_preview.md
      - "13 — Neural Operators": chapters/13_neural_operators.md
      - "14 — Topology / TDA": chapters/14_topology_tda.md
      - "15 — FNO vs DeepONet": chapters/15_fourier_neural_operator.md
  - Math map: math_map.md
  - Roadmap: roadmap.md
  - Topic ranking: physical_ai_math_2030.md
  - References: references.md
  - Building the site: building.md
  - Notebooks: https://github.com/rsasaki0109/RobotMath2030/tree/main/notebooks

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rsasaki0109/RobotMath2030
